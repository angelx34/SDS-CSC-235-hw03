<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDS-CSC-235 HW03 - Interacting with Data</title>
    <link rel="stylesheet" href="style.css" />
    <script src="d3.v7.min.js"></script>
  </head>

  <body>
    <header>
      <h1>SDS-CSC-235 HW03: Interacting with Data</h1>
      <p class="subtitle">
        Language Families — Frequency (Bar Chart) + Proportion (Pie Chart)
      </p>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Frequency of Language Families</h2>
        <div id="bar-chart"></div>
        <p class="hint">Click a bar!</p>
      </section>

      <section class="card">
        <h2>Proportion of Language Families</h2>
        <div id="pie-chart"></div>
        <div id="pie-info" class="infoBox">
          Click a slice to display its family and proportion .
        </div>
      </section>
    </main>

    <footer>
      <p>Built with D3.js v7</p>
    </footer>

    <script src="index.js"></script>
  </body>
</html>
